<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Admin – Hochzeit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body class="plain">
  <main class="admin-card">
    <h1>Admin-Dashboard</h1>
    <p class="subtitle">Live-Übersicht: Zusagen, +1, Kinder, Vegetarier &amp; Veganer</p>

    <div id="loginBox" class="login">
      <input id="adminPwd" type="password" placeholder="Admin-Passwort" autocomplete="current-password">
      <button id="loginBtn" class="btn">Einloggen</button>
      <p id="loginErr" class="error" hidden>Falsches Passwort.</p>
    </div>

    <section id="stats" class="stats" hidden>
      <div class="grid">
        <div class="kpi"><div class="kpi-number" id="kpiErwachsene">–</div><div class="kpi-label">Erwachsene (Zusagen inkl. +1)</div></div>
        <div class="kpi"><div class="kpi-number" id="kpiKinder">–</div><div class="kpi-label">Kinder</div></div>
        <div class="kpi"><div class="kpi-number" id="kpiVeg">–</div><div class="kpi-label">Vegetarier</div></div>
        <div class="kpi"><div class="kpi-number" id="kpiVegan">–</div><div class="kpi-label">Veganer</div></div>
        <div class="kpi"><div class="kpi-number" id="kpiPlusOne">–</div><div class="kpi-label">Mit +1</div></div>
        <div class="kpi"><div class="kpi-number" id="kpiAbsagen">–</div><div class="kpi-label">Absagen</div></div>
      </div>

      <div class="row gap">
        <button id="refreshBtn" class="btn ghost">Aktualisieren</button>
        <a id="sheetLink" class="btn link" target="_blank" rel="noopener">Zur Tabelle</a>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
